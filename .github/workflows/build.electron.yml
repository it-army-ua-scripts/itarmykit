name: Build and publish electron app

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build_for_linux:
    name: Build for linux
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'yarn'
      - name: Install dependencies
        run: |
          rm -rf dist/
          corepack enable
          yarn install --frozen-lockfile
      - name: Build and release Linux binaries
        env:
          EP_GH_IGNORE_TIME: true
          GH_TOKEN: ${{ secrets.GH_ACCESS_TOKEN }}
        run: |
          yarn quasar build --mode electron --publish always -T linux --icon=/src-electron/icons/icon.png
  build_for_windows_x64:
    name: Build for windows
    runs-on: windows-2022
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'yarn'
      - name: Install dependencies
        run: |
          corepack enable
          yarn install --frozen-lockfile
      - name: Download VC++ Redistributables
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://aka.ms/vc14/vc_redist.x64.exe" -OutFile "vc_redist.x64.exe"
          Invoke-WebRequest -Uri "https://aka.ms/vc14/vc_redist.arm64.exe" -OutFile "vc_redist.arm64.exe"
          if (!(Test-Path "vc_redist.x64.exe")) { throw "vc_redist.x64.exe download failed" }
          if (!(Test-Path "vc_redist.arm64.exe")) { throw "vc_redist.arm64.exe download failed" }
      - name: Build and release Windows binaries 
        env:
          EP_GH_IGNORE_TIME: true
          GH_TOKEN: ${{ secrets.GH_ACCESS_TOKEN }}
        run: |
          yarn quasar build --mode electron --publish always -T win32 --icon=/src-electron/icons/icon.ico
  build_for_macos_14:
    name: Build for MacOS-14
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'yarn'
      - name: Install dependencies
        run: |
          rm -rf dist/
          corepack enable
          yarn install --frozen-lockfile
      - name: dmg-license add
        run: |
          sudo npm install -g dmg-license
      - name: Build and release MacOS-14 binaries
        env:
          EP_GH_IGNORE_TIME: true
          GH_TOKEN: ${{ secrets.GH_ACCESS_TOKEN }}
        run: |
          yarn quasar build --mode electron --publish always -T darwin --icon=/src-electron/icons/icon.icns


